<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>RAG Search Engine — architecture</title>
<!-- Canonical warm-charcoal + amber palette tokens (--ink/--amber/--line/--emb-bg),
     single-sourced from scripts/figure_theme.py -> static/figures/_palette.css. -->
<link rel="stylesheet" href="/figures/_palette.css" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;600&display=swap');
  html,body{margin:0;background:var(--emb-bg);font-family:'JetBrains Mono',ui-monospace,monospace}
  .wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;
        height:100vh;gap:12px;padding:8px 12px;box-sizing:border-box}
  svg{width:100%;height:auto;max-height:82%}

  /* Grouping band behind the three parallel retrieval lanes — a dashed hairline
     and a barely-there fill so it reads as "these run in parallel and converge",
     not as another node. */
  .band{fill:color-mix(in srgb,var(--ink) 4%,transparent);
        stroke:var(--line);stroke-width:1.2;stroke-dasharray:3 5;stroke-opacity:.7}
  .band-label{fill:color-mix(in srgb,var(--ink) 55%,transparent);font-size:11px;
              font-weight:600;letter-spacing:0.16em;text-transform:uppercase}
  .sublabel{fill:color-mix(in srgb,var(--ink) 52%,transparent);font-size:10px;
            font-weight:500;letter-spacing:0.08em}

  .node rect{fill:rgba(138,131,112,0.06);stroke:var(--line);stroke-width:1.4;
             transition:fill .15s ease,stroke .15s ease}
  .node text{fill:var(--ink);font-size:12px;font-weight:500;letter-spacing:0.05em;
             text-transform:uppercase;pointer-events:none;transition:fill .15s ease}
  .node{cursor:pointer}

  /* The output node carries a faint amber by default so the eye lands on the
     end of the pipeline; hover/tap deepens it like any other stage. */
  .node.out rect{fill:color-mix(in srgb,var(--amber) 9%,transparent);
                 stroke:color-mix(in srgb,var(--amber) 50%,var(--line))}

  .edge{stroke:var(--line);stroke-width:1.6;fill:none;
        transition:stroke .15s ease,stroke-width .15s ease}

  /* active/lit defined last so they win over .out on the output node. */
  .node.active rect{stroke:var(--amber);stroke-width:2;fill:color-mix(in srgb,var(--amber) 16%,transparent)}
  .node.active text{fill:var(--amber)}
  .edge.lit{stroke:var(--amber);stroke-width:2.4}

  .cap{margin:0;color:var(--ink);font-size:12.5px;font-weight:500;text-align:center;
       min-height:1.3em;letter-spacing:0.02em}
</style>
</head>
<body>
<div class="wrap">
  <svg viewBox="0 0 1000 360" role="img" aria-label="RAG search engine pipeline: text and image queries run through three parallel retrieval lanes — lexical (BM25), semantic (embeddings), and visual (CLIP) — that converge into reciprocal-rank fusion, reranking, and a retrieval-augmented answer">
    <defs>
      <marker id="arrow" markerWidth="7" markerHeight="7" refX="5.5" refY="3" orient="auto" markerUnits="userSpaceOnUse">
        <path d="M0,0 L6,3 L0,6 z" fill="context-stroke" />
      </marker>
    </defs>

    <!-- retrieval grouping band + header -->
    <rect class="band" x="304" y="42" width="188" height="288" rx="16" />
    <text class="band-label" x="398" y="30" text-anchor="middle">Retrieval</text>

    <!-- lane sublabels (legible without hover) -->
    <text class="sublabel" x="396" y="114" text-anchor="middle">lexical</text>
    <text class="sublabel" x="396" y="216" text-anchor="middle">semantic</text>
    <text class="sublabel" x="396" y="318" text-anchor="middle">visual</text>

    <!-- edges (drawn first, under nodes) -->
    <path class="edge" id="e_q_enh"    d="M132,112 L166,112" marker-end="url(#arrow)" />
    <path class="edge" id="e_enh_bm"   d="M276,112 L320,78"  marker-end="url(#arrow)" />
    <path class="edge" id="e_enh_emb"  d="M276,112 L320,180" marker-end="url(#arrow)" />
    <path class="edge" id="e_img_clip" d="M132,282 L320,282" marker-end="url(#arrow)" />
    <path class="edge" id="e_bm_rrf"   d="M470,78  L538,180" marker-end="url(#arrow)" />
    <path class="edge" id="e_emb_rrf"  d="M470,180 L538,180" marker-end="url(#arrow)" />
    <path class="edge" id="e_clip_rrf" d="M470,282 L538,180" marker-end="url(#arrow)" />
    <path class="edge" id="e_rrf_rer"  d="M660,180 L698,180" marker-end="url(#arrow)" />
    <path class="edge" id="e_rer_rag"  d="M812,180 L850,180" marker-end="url(#arrow)" />

    <!-- nodes -->
    <g class="node" data-id="query"><rect x="24"  y="92"  width="108" height="40" rx="8"/><text x="78"  y="112" text-anchor="middle" dominant-baseline="central">Query</text></g>
    <g class="node" data-id="image"><rect x="24"  y="262" width="108" height="40" rx="8"/><text x="78"  y="282" text-anchor="middle" dominant-baseline="central">Image</text></g>
    <g class="node" data-id="enhance"><rect x="168" y="92"  width="108" height="40" rx="8"/><text x="222" y="112" text-anchor="middle" dominant-baseline="central">Enhance</text></g>
    <g class="node" data-id="bm25"><rect x="322" y="58"  width="148" height="40" rx="8"/><text x="396" y="78"  text-anchor="middle" dominant-baseline="central">BM25</text></g>
    <g class="node" data-id="embed"><rect x="322" y="160" width="148" height="40" rx="8"/><text x="396" y="180" text-anchor="middle" dominant-baseline="central">Embeddings</text></g>
    <g class="node" data-id="clip"><rect x="322" y="262" width="148" height="40" rx="8"/><text x="396" y="282" text-anchor="middle" dominant-baseline="central">CLIP</text></g>
    <g class="node" data-id="rrf"><rect x="540" y="160" width="120" height="40" rx="8"/><text x="600" y="180" text-anchor="middle" dominant-baseline="central">RRF fusion</text></g>
    <g class="node" data-id="rerank"><rect x="700" y="160" width="112" height="40" rx="8"/><text x="756" y="180" text-anchor="middle" dominant-baseline="central">Rerank</text></g>
    <g class="node out" data-id="rag"><rect x="852" y="160" width="126" height="40" rx="8"/><text x="915" y="180" text-anchor="middle" dominant-baseline="central">RAG answer</text></g>
  </svg>
  <p class="cap" id="cap">Hover or tap a stage to see what it does.</p>
</div>

<script>
  const caps = {
    query:   "The user's text query.",
    image:   "Or an image as the query — multimodal search.",
    enhance: "LLM query enhancement: spell-correct, rewrite, expand.",
    bm25:    "Lexical lane — probabilistic BM25 keyword ranking.",
    embed:   "Semantic lane — sentence-transformer vector search.",
    clip:    "Visual lane — image search via CLIP vision embeddings.",
    rrf:     "Reciprocal-rank fusion blends the three ranked lists.",
    rerank:  "Cross-encoder rescoring of the fused candidates.",
    rag:     "Grounded answer with citations from the top results."
  };
  const edges = {
    query:   ["e_q_enh"],
    image:   ["e_img_clip"],
    enhance: ["e_q_enh","e_enh_bm","e_enh_emb"],
    bm25:    ["e_enh_bm","e_bm_rrf"],
    embed:   ["e_enh_emb","e_emb_rrf"],
    clip:    ["e_img_clip","e_clip_rrf"],
    rrf:     ["e_bm_rrf","e_emb_rrf","e_clip_rrf","e_rrf_rer"],
    rerank:  ["e_rrf_rer","e_rer_rag"],
    rag:     ["e_rer_rag"]
  };
  const DEFAULT = "Hover or tap a stage to see what it does.";
  const cap = document.getElementById("cap");
  const nodes = [...document.querySelectorAll(".node")];

  function clearAll() {
    nodes.forEach((x) => x.classList.remove("active"));
    document.querySelectorAll(".edge").forEach((e) => e.classList.remove("lit"));
    cap.textContent = DEFAULT;
  }
  function show(n) {
    const id = n.dataset.id;
    n.classList.add("active");
    (edges[id] || []).forEach((e) => document.getElementById(e)?.classList.add("lit"));
    cap.textContent = caps[id] || DEFAULT;
  }

  // pinned: a tapped node stays lit until tapped again or another node/background
  // is tapped — so touch devices (no hover) can explore the pipeline too.
  let pinned = null;
  nodes.forEach((n) => {
    n.addEventListener("mouseenter", () => { if (!pinned) show(n); });
    n.addEventListener("mouseleave", () => { if (!pinned) clearAll(); });
    n.addEventListener("click", (ev) => {
      ev.stopPropagation();
      if (pinned === n) { pinned = null; clearAll(); return; }
      clearAll(); show(n); pinned = n;
    });
  });
  document.addEventListener("click", () => { if (pinned) { pinned = null; clearAll(); } });
</script>
<!-- Figure embed channel: theme sync + ready handshake (see /figures/_embed.js). -->
<script src="/figures/_embed.js"></script>
</body>
</html>
