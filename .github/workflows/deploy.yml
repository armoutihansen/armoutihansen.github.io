name: Deploy Astro site to Pages

on:
  push:
    branches:
      - master
  schedule:
    # Refresh the GitHub contribution graph daily at 06:00 UTC.
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4
      - name: Install dependencies
        run: npm ci
      - name: Type-check with Astro
        run: npm run check
      - name: Refresh GitHub stats
        # Regenerate src/data/github.json so the deployed graph is current. If the
        # public scrape fails, keep the committed snapshot rather than failing deploy.
        run: node scripts/gen_github_data.mjs || echo "GitHub stats refresh failed; using committed src/data/github.json"
      - name: Build with Astro
        run: npm run build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
